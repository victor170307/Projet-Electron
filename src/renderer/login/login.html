<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion - Labyrinthe Project</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-container">
        <h1>Bienvenue</h1>
        <div class="form-group">
            <label>Nom d'utilisateur</label>
            <input type="text" id="username" placeholder="Entrez votre pseudo">
        </div>
        <div class="form-group">
            <label>Mot de passe</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        
        <div class="actions">
            <button type="button" onclick="handleLogin()">Connexion</button>
            <button type="button" class="btn-alt" onclick="handleRegister()">S'inscrire</button>
        </div>

        <p id="result"></p>
    </div>

    <script src="login.js"></script>
</body>
</html>
